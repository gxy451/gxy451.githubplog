<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>archive | Meospill's Blog</title>
    <head>
        <link rel="icon" href="cheery.png">
    </head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, '微软雅黑', sans-serif;
            background: url("greenroot.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #1a3a24;
            text-shadow: 0 1px 1px rgba(255, 255, 245, 0.5);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .navbar {
            background: rgba(255, 255, 245, 0.96);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #d4e8d1;
            padding: 12px 0;
        }

        .nav-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2b7340;
            text-decoration: none;
            background: #eaf8e6;
            padding: 4px 18px;
            border-radius: 40px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #2d5a3a;
            font-weight: 500;
            transition: 0.2s;
            text-shadow: none;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #1b8742;
            border-bottom: 2px solid #6fbf6f;
            padding-bottom: 4px;
        }

        .search-area {
            background: #f1f9ef;
            padding: 6px 16px;
            border-radius: 60px;
            display: flex;
            gap: 8px;
            border: 1px solid #cbe5cb;
        }

        .search-area input {
            border: none;
            background: transparent;
            outline: none;
            width: 140px;
            color: #1a3a24;
        }

        .search-area input::placeholder {
            color: #8aa87d;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-btn {
            background: #3a8a4a;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            text-shadow: none;
        }

        .logout-btn {
            background: #ccc;
            color: #333;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            text-shadow: none;
        }

        .user-name {
            color: #1f5430;
            font-weight: 500;
        }
        .page-header {
            margin: 40px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h1 {
            font-size: 2rem;
            color: #0a2a14;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 1px 2px rgba(255, 255, 240, 0.6);
        }

        .sort-controls {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 245, 0.85);
            padding: 6px 12px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .sort-btn {
            background: #eef7ea;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2d5a3a;
            transition: all 0.2s;
            text-shadow: none;
        }

        .sort-btn.active {
            background: #2e7d32;
            color: white;
        }

        .sort-btn:hover:not(.active) {
            background: #d9efd4;
        }
        .archive-content {
            margin: 30px 0 50px;
        }

        .archive-year {
            margin: 30px 0 15px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #0c331a;
            border-left: 5px solid #6fbf6f;
            padding-left: 18px;
            text-shadow: 0 1px 1px rgba(255, 255, 240, 0.5);
        }

        .archive-month {
            margin: 20px 0 12px 20px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #1a2e1f;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 1px 1px rgba(255, 255, 240, 0.4);
        }

        .month-count {
            font-size: 0.75rem;
            background: rgba(238, 247, 234, 0.85);
            padding: 2px 10px;
            border-radius: 30px;
            color: #2a5c3e;
            text-shadow: none;
        }

        .archive-list {
            margin-left: 35px;
        }

        .archive-item {
            padding: 12px 0;
            border-bottom: 1px dashed rgba(180, 220, 160, 0.6);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: 0.2s;
        }

        .archive-item:hover {
            background: rgba(200, 230, 190, 0.4);
            padding-left: 10px;
            border-radius: 16px;
        }

        .item-title {
            font-size: 1rem;
            color: #0a2a14;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            text-shadow: 0 0.5px 1px rgba(255, 255, 240, 0.5);
        }

        .item-icon {
            font-size: 1.2rem;
            text-shadow: none;
        }

        .item-category {
            font-size: 0.7rem;
            background: rgba(238, 247, 234, 0.85);
            padding: 3px 10px;
            border-radius: 30px;
            color: #4a6e28;
            text-shadow: none;
        }

        .item-date {
            font-size: 0.75rem;
            color: #3a5a40;
            font-weight: 600;
            text-shadow: 0 0.5px 1px rgba(255, 255, 240, 0.5);
        }

        .external-badge {
            font-size: 0.65rem;
            background: rgba(238, 247, 234, 0.85);
            padding: 2px 8px;
            border-radius: 20px;
            color: #c0392b;
            text-shadow: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 245, 0.85);
            border-radius: 32px;
            color: #5a7a5a;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 700px) {
            .nav-wrap {
                flex-direction: column;
            }
            .page-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .archive-list {
                margin-left: 15px;
            }
            .archive-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-wrap">
        <a href="index.html" class="logo">Meospill</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="category.html">分类</a>
            <a href="archive.html" class="active">归档</a>
            <a href="AboutMe.html">关于我</a>
        </div>
        <div class="search-area">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜文章...">
        </div>
        <div class="user-info" id="userInfo">
        </div>
    </div>
</div>

<div class="container">
    <div class="page-header">
        <h1>📅 文章归档</h1>
        <div class="sort-controls">
            <button class="sort-btn active" id="sortDescBtn">⏰ 最新优先</button>
            <button class="sort-btn" id="sortAscBtn">🕰️ 最早优先</button>
        </div>
    </div>

    <div id="archiveContainer" class="archive-content"></div>
</div>
<script>
   
    const articlesData = [
      
        { id: 1, title: "毕业季限定｜舌尖珍藏专属校园盛夏回忆", date: "2026-05-28", category: "美食",likes: 156, tags: ["毕业季", "校园美食"], icon: "🍜", externalUrl: "毕业季美食选题.html"},
        { id: 2, title: "一键解压CCSU美食压缩包", date: "2025-12-13", category: "美食", likes: 589, tags: ["校园美食", "CCSU"], icon: "🍰",externalUrl:"美食压缩包.html"},
        { id: 3, title: "校园美食MBTI图鉴｜CCSUers的味蕾人格鉴定", date: "2025-11-04", category: "美食", likes: 767, tags: ["MBTI", "校园美食"], icon: "🍲" ,externalUrl:"MBTI.html"},
       
        { id: 4, title: "这里，藏着CCSU的“秋日回忆”密码", date: "2025-11-07", category: "风景", likes: 203, tags: ["校园美景", "秋天"], icon: "🏔️", externalUrl: "AutumnMessage.html" },
        { id: 5, title: "青听植物的声音｜它们在用呼吸雕刻时光", date: "2025-10-26", category: "风景", likes: 112, tags: ["绿植", "校园风景"], icon: "🚲" ,externalUrl:"breathe.html"},
        { id: 6, title: "把春天拆成四封信，寄给正在赶路的你", date: "2026-04-09", category: "风景", likes: 78, tags: ["春日", "校园风景"], icon: "🏘️" ,externalUrl:"letters.html"},
    
        { id: 7, title: "521遇茶日｜一叶茶香温柔撞满怀", date: "2026-05-21", category: "知识&科普",likes: 1018, tags: ["茶文化", "521"], icon: "🍵",  externalUrl: "tea选题.html"  },
        { id: 8, title: "四级高分作文万能金句汇总", date: "2026-05-14", category: "知识&科普",likes: 1018, tags: ["四级", "学习"], icon: "💪", externalUrl: "四级.html" },
        { id: 9, title: "以诚赴考，不负韶华｜共建清朗校园考风", date: "2026-06-04", category: "知识&科普",likes: 1999, tags: ["期末周", "考试"], icon: "📚", externalUrl: "诚信考试.html" },
    
        { id: 10, title: "“星火之旅”破冰召集令 | 我们的故事，从相遇开始", date: "2025-11-17", category: "活动", likes: 456, tags: ["破冰活动", "青春"], icon: "📚",externalUrl:"ice.html" },
        { id: 11, title: "青马课堂·养心篇| 青马“励”量，“心”火相传", date: "2025-10-28", category: "活动", likes: 288, tags: ["青马工程", "心理健康"], icon: "♻️" ,externalUrl:"qingma.html"},
        { id: 12, title: "春“锋”拂校园｜志愿集市赴新程", date: "2026-04-09", category: "活动", likes:142, tags: ["志愿活动", "雷锋精神"], icon: "📷" ,externalUrl:"志愿集市.html"},
    
        { id: 13, title: "夏风逐歌，草坪音乐节圆满落幕", date: "2026-05-16", category: "活动", likes: 134, tags: ["草坪音乐节", "夏日好歌声"], icon: "📝",externalUrl:"grass.html" }
    ];

    let sortOrder = 'desc'; 

    function getCategoryIcon(cat) {
        const map = { '美食': '🍜', '风景': '🏔️', '科普': '🔬', '活动': '🎉' };
        return map[cat] || '📄';
    }

    function getClickHandler(article) {
        const hasExternalUrl = article.externalUrl && article.externalUrl.trim() !== "";
        if (hasExternalUrl) {
            return `window.open('${article.externalUrl}', '_blank')`;
        } else {
            return `location.href='article.html?id=${article.id}'`;
        }
    }
    function renderArchive() {
        const container = document.getElementById('archiveContainer');
        if (!container) return;
        let sortedArticles = [...articlesData];
        if (sortOrder === 'desc') {
            sortedArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
        } else {
            sortedArticles.sort((a, b) => new Date(a.date) - new Date(b.date));
        }
        const grouped = {};
        sortedArticles.forEach(article => {
            const dateObj = new Date(article.date);
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth() + 1;
            const key = `${year}-${month.toString().padStart(2, '0')}`;
            if (!grouped[key]) {
                grouped[key] = { year, month, articles: [] };
            }
            grouped[key].articles.push(article);
        });
        let groupKeys = Object.keys(grouped);
        if (sortOrder === 'desc') {
            groupKeys.sort((a, b) => {
                const [yearA, monthA] = a.split('-').map(Number);
                const [yearB, monthB] = b.split('-').map(Number);
                if (yearA !== yearB) return yearB - yearA;
                return monthB - monthA;
            });
        } else {
            groupKeys.sort((a, b) => {
                const [yearA, monthA] = a.split('-').map(Number);
                const [yearB, monthB] = b.split('-').map(Number);
                if (yearA !== yearB) return yearA - yearB;
                return monthA - monthB;
            });
        }

        if (groupKeys.length === 0) {
            container.innerHTML = `<div class="empty-state">🌱 暂无归档文章，快去写点什么吧～</div>`;
            return;
        }

        let html = '';
        let currentYear = '';

        groupKeys.forEach(key => {
            const { year, month, articles } = grouped[key];
            if (currentYear !== String(year)) {
                currentYear = String(year);
                html += `<div class="archive-year">📁 ${year} 年</div>`;
            }
            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            const monthName = monthNames[month - 1];
            html += `<div class="archive-month">
                        <span>📅 ${monthName}</span>
                        <span class="month-count">${articles.length}篇</span>
                      </div>`;
            html += `<div class="archive-list">`;
            articles.forEach(article => {
                const hasExternal = article.externalUrl && article.externalUrl.trim() !== "";
                const externalBadge = hasExternal ? `<span class="external-badge">🔗 外链</span>` : '';
                const clickHandler = getClickHandler(article);
                
                html += `
                    <div class="archive-item" onclick="${clickHandler}">
                        <div class="item-title">
                            <span class="item-icon">${article.icon || getCategoryIcon(article.category)}</span>
                            <span>${article.title}</span>
                            <span class="item-category">${article.category}</span>
                            ${externalBadge}
                        </div>
                        <div class="item-date">${article.date}</div>
                    </div>
                `;
            });
            html += `</div>`;
        });

        container.innerHTML = html;
    }

    function setSortOrder(order) {
        sortOrder = order;

        const descBtn = document.getElementById('sortDescBtn');
        const ascBtn = document.getElementById('sortAscBtn');
        if (order === 'desc') {
            descBtn.classList.add('active');
            ascBtn.classList.remove('active');
        } else {
            ascBtn.classList.add('active');
            descBtn.classList.remove('active');
        }
        renderArchive();
    }
    function initSearch() {
        const searchInput = document.getElementById('searchInput');
        if (!searchInput) return;
        let currentFiltered = [...articlesData];
        
        function applySearch() {
            const keyword = searchInput.value.trim().toLowerCase();
            if (keyword === '') {
                
                renderArchiveWithFilter([...articlesData]);
            } else {
                const filtered = articlesData.filter(article => 
                    article.title.toLowerCase().includes(keyword) ||
                    article.category.toLowerCase().includes(keyword) ||
                    article.tags.some(tag => tag.toLowerCase().includes(keyword))
                );
                renderArchiveWithFilter(filtered);
            }
        }

        function renderArchiveWithFilter(filteredArticles) {
           
            const container = document.getElementById('archiveContainer');
            if (!container) return;
            
            let sorted = [...filteredArticles];
            if (sortOrder === 'desc') {
                sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else {
                sorted.sort((a, b) => new Date(a.date) - new Date(b.date));
            }
            
            const grouped = {};
            sorted.forEach(article => {
                const dateObj = new Date(article.date);
                const year = dateObj.getFullYear();
                const month = dateObj.getMonth() + 1;
                const key = `${year}-${month.toString().padStart(2, '0')}`;
                if (!grouped[key]) {
                    grouped[key] = { year, month, articles: [] };
                }
                grouped[key].articles.push(article);
            });
            
            let groupKeys = Object.keys(grouped);
            if (sortOrder === 'desc') {
                groupKeys.sort((a, b) => {
                    const [yearA, monthA] = a.split('-').map(Number);
                    const [yearB, monthB] = b.split('-').map(Number);
                    if (yearA !== yearB) return yearB - yearA;
                    return monthB - monthA;
                });
            } else {
                groupKeys.sort((a, b) => {
                    const [yearA, monthA] = a.split('-').map(Number);
                    const [yearB, monthB] = b.split('-').map(Number);
                    if (yearA !== yearB) return yearA - yearB;
                    return monthA - monthB;
                });
            }
            
            if (groupKeys.length === 0) {
                container.innerHTML = `<div class="empty-state">🔍 没有找到与“${keyword}”相关的文章</div>`;
                return;
            }
            
            let html = '';
            let currentYear = '';
            groupKeys.forEach(key => {
                const { year, month, articles } = grouped[key];
                if (currentYear !== String(year)) {
                    currentYear = String(year);
                    html += `<div class="archive-year">📁 ${year} 年</div>`;
                }
                const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
                const monthName = monthNames[month - 1];
                html += `<div class="archive-month"><span>📅 ${monthName}</span><span class="month-count">${articles.length}篇</span></div>`;
                html += `<div class="archive-list">`;
                articles.forEach(article => {
                    const hasExternal = article.externalUrl && article.externalUrl.trim() !== "";
                    const externalBadge = hasExternal ? `<span class="external-badge">🔗 外链</span>` : '';
                    const clickHandler = hasExternal ? `window.open('${article.externalUrl}', '_blank')` : `location.href='article.html?id=${article.id}'`;
                    html += `
                        <div class="archive-item" onclick="${clickHandler}">
                            <div class="item-title">
                                <span class="item-icon">${article.icon || getCategoryIcon(article.category)}</span>
                                <span>${article.title}</span>
                                <span class="item-category">${article.category}</span>
                                ${externalBadge}
                            </div>
                            <div class="item-date">${article.date}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            container.innerHTML = html;
        }
        
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                applySearch();
            }
        });
    }
    function updateUserUI() {
        const userInfoDiv = document.getElementById('userInfo');
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            const user = JSON.parse(currentUser);
            userInfoDiv.innerHTML = `
                <span class="user-name">🌿 ${user.username}</span>
                <button class="logout-btn" id="logoutBtn">退出</button>
            `;
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.onclick = () => { localStorage.removeItem('currentUser'); updateUserUI(); alert('已退出登录'); };
        } else {
            userInfoDiv.innerHTML = `<button class="login-btn" id="loginBtn">登录/注册</button>`;
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) loginBtn.onclick = () => { window.location.href = 'index.html'; };
        }
    }
    function init() {
        const descBtn = document.getElementById('sortDescBtn');
        const ascBtn = document.getElementById('sortAscBtn');
        if (descBtn) descBtn.addEventListener('click', () => setSortOrder('desc'));
        if (ascBtn) ascBtn.addEventListener('click', () => setSortOrder('asc'));
        renderArchive();
        initSearch();
        updateUserUI();
    }
    
    init();
</script>
</body>
</html>
