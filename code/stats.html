<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 | Meospill's Blog</title>
    <link rel="icon" href="cheery.png">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, '微软雅黑', sans-serif;
            background: url("greenroot.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #1a3a24;
            text-shadow: 0 1px 1px rgba(255, 255, 245, 0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            background: rgba(255, 255, 245, 0.96);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #d4e8d1;
            padding: 12px 0;
        }

        .nav-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2b7340;
            text-decoration: none;
            background: #eaf8e6;
            padding: 4px 18px;
            border-radius: 40px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #2d5a3a;
            font-weight: 500;
            transition: 0.2s;
            text-shadow: none;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #1b8742;
            border-bottom: 2px solid #6fbf6f;
            padding-bottom: 4px;
        }

        .search-area {
            background: #f1f9ef;
            padding: 6px 16px;
            border-radius: 60px;
            display: flex;
            gap: 8px;
            border: 1px solid #cbe5cb;
        }

        .search-area input {
            border: none;
            background: transparent;
            outline: none;
            width: 140px;
            color: #1a3a24;
        }

        .search-area input::placeholder {
            color: #8aa87d;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-btn {
            background: #3a8a4a;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            text-shadow: none;
        }

        .logout-btn {
            background: #ccc;
            color: #333;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            text-shadow: none;
        }

        .user-name {
            color: #1f5430;
            font-weight: 500;
        }

       
        .stats-header {
            margin: 40px 0 30px;
            text-align: center;
        }

        .stats-header h1 {
            font-size: 2rem;
            color: #0a2a14;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .stats-header p {
            color: #3a6b47;
            margin-top: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stats-card {
            background: rgba(255, 255, 245, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 24px 20px;
            text-align: center;
            border: 1px solid #d4e8d1;
            transition: transform 0.2s;
        }

        .stats-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 245, 0.98);
        }

        .stats-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 8px;
        }

        .stats-card .label {
            font-size: 0.9rem;
            color: #4a6e4e;
            letter-spacing: 1px;
        }

        .stats-card .sub {
            font-size: 0.7rem;
            color: #8aa87d;
            margin-top: 8px;
        }

        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .chart-container {
            background: rgba(255, 255, 245, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #d4e8d1;
            transition: 0.2s;
        }

        .chart-container h3 {
            margin-bottom: 16px;
            color: #1f5430;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #6fbf6f;
            padding-left: 12px;
        }

        .chart-box {
            width: 100%;
            height: 320px;
        }

        .full-width-chart {
            margin-bottom: 40px;
        }

        .full-width-chart .chart-container {
            width: 100%;
        }

        .full-width-chart .chart-box {
            height: 360px;
        }

        .hot-articles-list {
            margin-top: 20px;
            background: rgba(255, 255, 245, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #d4e8d1;
            margin-bottom: 40px;
        }

        .hot-articles-list h3 {
            margin-bottom: 16px;
            color: #1f5430;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #6fbf6f;
            padding-left: 12px;
        }

        .hot-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px dashed #cbe5cb;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 16px;
        }

        .hot-item:hover {
            background: #eef7ea;
            transform: translateX(5px);
        }

        .hot-item .rank {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffb347;
            min-width: 40px;
        }

        .hot-item .rank.top1 { color: #ff6b35; }
        .hot-item .rank.top2 { color: #ffa559; }
        .hot-item .rank.top3 { color: #ffcd94; }

        .hot-item .title {
            flex: 1;
            margin: 0 15px;
            font-weight: 500;
            color: #1a3a24;
        }

        .hot-item .likes {
            color: #e57373;
            font-size: 0.85rem;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .chart-row {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 550px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .nav-wrap {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-wrap">
        <a href="index.html" class="logo">Meospill</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="category.html">分类</a>
            <a href="archive.html">归档</a>
            <a href="AboutMe.html">关于我</a>
            <a href="stats.html" class="active">数据统计</a>
        </div>
        <div class="search-area">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜文章...">
        </div>
        <div class="user-info" id="userInfo"></div>
    </div>
</div>

<div class="container">
    <div class="stats-header">
        <h1>📊 博客数据看板</h1>
        <p>📈 文章统计 · 阅读趋势 · 数据分析</p>
    </div>

    
    <div class="stats-grid" id="statsCards">
        <div class="stats-card"><div class="number">-</div><div class="label">总文章数</div><div class="sub">📄 持续更新中</div></div>
        <div class="stats-card"><div class="number">-</div><div class="label">总点赞数</div><div class="sub">❤️ 来自读者的支持</div></div>
        <div class="stats-card"><div class="number">-</div><div class="label">文章分类数</div><div class="sub">🏷️ 多元内容</div></div>
        <div class="stats-card"><div class="number">-</div><div class="label">平均点赞</div><div class="sub">✨ 每篇文章受欢迎度</div></div>
    </div>

    
    <div class="chart-row">
        <div class="chart-container">
            <h3>📂 分类文章数量</h3>
            <div id="categoryChart" class="chart-box"></div>
        </div>
        <div class="chart-container">
            <h3>📅 近12个月文章发布趋势</h3>
            <div id="trendChart" class="chart-box"></div>
        </div>
    </div>

    
    <div class="full-width-chart">
        <div class="chart-container">
            <h3>🔥 文章热度排行榜（点赞数TOP）</h3>
            <div id="likesBarChart" class="chart-box" style="height: 350px;"></div>
        </div>
    </div>

    
    <div class="hot-articles-list" id="hotArticlesList">
        <h3>⭐ 读者最爱 · 高赞文章精选</h3>
        <div style="padding: 5px 0;" id="hotListContainer"></div>
    </div>
</div>


<script>
    
    const articlesData = [
        { id: 1, title: "毕业季限定｜舌尖珍藏专属校园盛夏回忆", date: "2026-05-28", category: "美食", likes: 156, tags: ["毕业季", "校园美食"], icon: "🍜", externalUrl: "毕业季美食选题.html" },
        { id: 2, title: "一键解压CCSU美食压缩包", date: "2025-12-13", category: "美食", likes: 589, tags: ["校园美食", "CCSU"], icon: "🍰", externalUrl: "美食压缩包.html" },
        { id: 3, title: "校园美食MBTI图鉴｜CCSUers的味蕾人格鉴定", date: "2025-11-04", category: "美食", likes: 767, tags: ["MBTI", "校园美食"], icon: "🍲", externalUrl: "MBTI.html" },
        { id: 4, title: "这里，藏着CCSU的“秋日回忆”密码", date: "2025-11-07", category: "风景", likes: 203, tags: ["校园美景", "秋天"], icon: "🏔️", externalUrl: "AutumnMessage.html" },
        { id: 5, title: "青听植物的声音｜它们在用呼吸雕刻时光", date: "2025-10-26", category: "风景", likes: 112, tags: ["绿植", "校园风景"], icon: "🚲", externalUrl: "breathe.html" },
        { id: 6, title: "把春天拆成四封信，寄给正在赶路的你", date: "2026-04-09", category: "风景", likes: 78, tags: ["春日", "校园风景"], icon: "🏘️", externalUrl: "letters.html" },
        { id: 7, title: "521遇茶日｜一叶茶香温柔撞满怀", date: "2026-05-21", category: "知识&科普", likes: 1018, tags: ["茶文化", "521"], icon: "🍵", externalUrl: "tea选题.html" },
        { id: 8, title: "四级高分作文万能金句汇总", date: "2026-05-14", category: "知识&科普", likes: 1018, tags: ["四级", "学习"], icon: "💪", externalUrl: "四级.html" },
        { id: 9, title: "以诚赴考，不负韶华｜共建清朗校园考风", date: "2026-06-04", category: "知识&科普", likes: 1999, tags: ["期末周", "考试"], icon: "📚", externalUrl: "诚信考试.html" },
        { id: 10, title: "“星火之旅”破冰召集令 | 我们的故事，从相遇开始", date: "2025-11-17", category: "活动", likes: 456, tags: ["破冰活动", "青春"], icon: "📚", externalUrl: "ice.html" },
        { id: 11, title: "青马课堂·养心篇| 青马“励”量，“心”火相传", date: "2025-10-28", category: "活动", likes: 288, tags: ["青马工程", "心理健康"], icon: "♻️", externalUrl: "qingma.html" },
        { id: 12, title: "春“锋”拂校园｜志愿集市赴新程", date: "2026-04-09", category: "活动", likes: 142, tags: ["志愿活动", "雷锋精神"], icon: "📷", externalUrl: "志愿集市.html" },
        { id: 13, title: "夏风逐歌，草坪音乐节圆满落幕", date: "2026-05-16", category: "活动", likes: 134, tags: ["草坪音乐节", "夏日好歌声"], icon: "📝", externalUrl: "grass.html" }
    ];

   
    function getCategoryStats() {
        const catMap = new Map();
        articlesData.forEach(article => {
            const cat = article.category;
            catMap.set(cat, (catMap.get(cat) || 0) + 1);
        });
        const categories = Array.from(catMap.keys());
        const counts = Array.from(catMap.values());
        return { categories, counts };
    }

    
    function getMonthlyTrend() {
        const monthMap = new Map();
        const now = new Date();
        const months = [];
        
        for (let i = 11; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const year = d.getFullYear();
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const key = `${year}-${month}`;
            months.push(key);
            monthMap.set(key, 0);
        }

        articlesData.forEach(article => {
            const dateObj = new Date(article.date);
            if (isNaN(dateObj)) return;
            const year = dateObj.getFullYear();
            const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
            const key = `${year}-${month}`;
            if (monthMap.has(key)) {
                monthMap.set(key, monthMap.get(key) + 1);
            }
        });

        const monthLabels = months.map(m => {
            const [y, mon] = m.split('-');
            return `${y.slice(2)}/${mon}`;
        });
        const articleCounts = months.map(m => monthMap.get(m) || 0);
        return { monthLabels, articleCounts };
    }

    
    function getLikesRanking() {
        const sorted = [...articlesData].sort((a, b) => b.likes - a.likes);
        const top5 = sorted.slice(0, 6);  // 展示前6
        return {
            titles: top5.map(a => a.title.length > 12 ? a.title.slice(0, 10) + '...' : a.title),
            likes: top5.map(a => a.likes),
            fullData: top5
        };
    }

    
    function getFullHotList() {
        return [...articlesData].sort((a, b) => b.likes - a.likes);
    }

    
    function goToArticle(article) {
        if (article.externalUrl && article.externalUrl.trim()) {
            window.open(article.externalUrl, '_blank');
        } else {
            location.href = `article.html?id=${article.id}`;
        }
    }

    
    let categoryChart = null, trendChart = null, likesBarChart = null;

    function renderCharts() {
        
        const { categories, counts } = getCategoryStats();
        if (categoryChart) categoryChart.dispose();
        const categoryDom = document.getElementById('categoryChart');
        if (categoryDom) {
            categoryChart = echarts.init(categoryDom);
            categoryChart.setOption({
                tooltip: { trigger: 'item', backgroundColor: 'rgba(255,255,245,0.9)', borderColor: '#6fbf6f' },
                legend: { orient: 'vertical', left: 'left', textStyle: { color: '#2c5a2e' } },
                series: [{
                    name: '文章分类', type: 'pie', radius: '55%', center: ['50%', '55%'],
                    data: categories.map((cat, idx) => ({ name: cat, value: counts[idx] })),
                    emphasis: { scale: true },
                    label: { color: '#1f5430', fontWeight: 'bold' },
                    itemStyle: {
                        borderRadius: 8,
                        borderColor: '#fff',
                        borderWidth: 2,
                        color: params => {
                            const colors = ['#6fbf6f', '#ffb347', '#74b9ff', '#e57373', '#a29bfe'];
                            return colors[params.dataIndex % colors.length];
                        }
                    }
                }],
                backgroundColor: 'transparent'
            });
        }

        
        const { monthLabels, articleCounts } = getMonthlyTrend();
        if (trendChart) trendChart.dispose();
        const trendDom = document.getElementById('trendChart');
        if (trendDom) {
            trendChart = echarts.init(trendDom);
            trendChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { top: 30, left: 50, right: 20, bottom: 30 },
                xAxis: { type: 'category', data: monthLabels, axisLabel: { rotate: 30, color: '#2c5a2e' }, axisLine: { lineStyle: { color: '#6fbf6f' } } },
                yAxis: { type: 'value', name: '文章数量', nameTextStyle: { color: '#3a6b47' }, splitLine: { lineStyle: { color: '#cbe5cb' } } },
                series: [{
                    data: articleCounts, type: 'line', smooth: true, symbol: 'circle', symbolSize: 8,
                    lineStyle: { width: 3, color: '#3a8a4a', shadowColor: '#8bc34a', shadowBlur: 6 },
                    areaStyle: { opacity: 0.2, color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#6fbf6f' }, { offset: 1, color: '#eaf8e6' }
                    ]) },
                    itemStyle: { color: '#2e7d32', borderColor: '#fff', borderWidth: 2 },
                    label: { show: true, position: 'top', color: '#1f5430' }
                }]
            });
        }

        const { titles, likes, fullData } = getLikesRanking();
        if (likesBarChart) likesBarChart.dispose();
        const barDom = document.getElementById('likesBarChart');
        if (barDom) {
            likesBarChart = echarts.init(barDom);
            likesBarChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: '{b}<br/>❤️ 点赞数: {c}' },
                grid: { left: '12%', right: '5%', containLabel: true },
                xAxis: { type: 'value', name: '点赞数', nameTextStyle: { color: '#3a6b47' }, axisLabel: { color: '#2c5a2e' } },
                yAxis: { type: 'category', data: titles, axisLabel: { fontWeight: 'bold', color: '#1f5430' }, axisLine: { show: false } },
                series: [{
                    data: likes, type: 'bar', barWidth: '40%', label: { show: true, position: 'right', fontWeight: 'bold' },
                    itemStyle: {
                        borderRadius: [0, 8, 8, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#8bc34a' }, { offset: 1, color: '#2e7d32' }
                        ])
                    }
                }]
            });
            
            likesBarChart.off('click');
            likesBarChart.on('click', (params) => {
                if (params.componentType === 'series' && fullData[params.dataIndex]) {
                    goToArticle(fullData[params.dataIndex]);
                }
            });
        }
    }

    function updateStatsCards() {
        const totalArticles = articlesData.length;
        const totalLikes = articlesData.reduce((sum, a) => sum + a.likes, 0);
        const uniqueCategories = new Set(articlesData.map(a => a.category)).size;
        const avgLikes = (totalLikes / totalArticles).toFixed(1);
        
        const cardsContainer = document.getElementById('statsCards');
        if (cardsContainer) {
            const numbers = cardsContainer.querySelectorAll('.number');
            if (numbers.length >= 4) {
                numbers[0].innerText = totalArticles;
                numbers[1].innerText = totalLikes;
                numbers[2].innerText = uniqueCategories;
                numbers[3].innerText = avgLikes;
            }
        }
    }

    function renderHotList() {
        const hotSorted = getFullHotList();
        const container = document.getElementById('hotListContainer');
        if (!container) return;
        let html = '';
        hotSorted.forEach((article, idx) => {
            let rankClass = '';
            let rankIcon = '';
            if (idx === 0) rankClass = 'top1';
            else if (idx === 1) rankClass = 'top2';
            else if (idx === 2) rankClass = 'top3';
            
            if (idx === 0) rankIcon = '🥇';
            else if (idx === 1) rankIcon = '🥈';
            else if (idx === 2) rankIcon = '🥉';
            else rankIcon = `${idx+1}`;
            
            const displayTitle = article.title.length > 32 ? article.title.slice(0, 30) + '...' : article.title;
            html += `
                <div class="hot-item" onclick="goToArticleById(${article.id})">
                    <div class="rank ${rankClass}">${rankIcon}</div>
                    <div class="title">${displayTitle} <span style="font-size:0.7rem;background:#eef7ea;padding:2px 6px;border-radius:20px;">${article.category}</span></div>
                    <div class="likes">❤️ ${article.likes}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    window.goToArticleById = (id) => {
        const article = articlesData.find(a => a.id === id);
        if (article) goToArticle(article);
    };

    function initSearch() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const kw = searchInput.value.trim();
                    if (kw) window.location.href = `category.html?search=${encodeURIComponent(kw)}`;
                }
            });
        }
    }

    function updateUserUI() {
        const userInfoDiv = document.getElementById('userInfo');
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            const user = JSON.parse(currentUser);
            userInfoDiv.innerHTML = `
                <span class="user-name">🌿 ${user.username}</span>
                <button class="logout-btn" id="logoutBtn">退出</button>
            `;
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.onclick = () => { localStorage.removeItem('currentUser'); updateUserUI(); alert('已退出登录'); window.location.reload(); };
        } else {
            userInfoDiv.innerHTML = `<button class="login-btn" id="loginBtn">登录/注册</button>`;
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) loginBtn.onclick = () => { window.location.href = 'index.html'; };
        }
    }

    window.addEventListener('resize', () => {
        if (categoryChart) categoryChart.resize();
        if (trendChart) trendChart.resize();
        if (likesBarChart) likesBarChart.resize();
    });

    function init() {
        updateStatsCards();
        renderCharts();
        renderHotList();
        initSearch();
        updateUserUI();
    }

    init();
</script>
</body>
</html>
