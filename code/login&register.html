<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: url("tree&bird.jpg") no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            padding: 10px 0;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: #999;
            border: none;
            background: none;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button[type="submit"] {
            width: 160px;          
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 30px;   
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            transition: 0.3s;
        }
        button[type="submit"]:hover {
            background: #5a67d8;
        }
        .msg {
            color: rgb(132, 225, 156);
            font-size: 12px;
            margin-top: 5px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="box">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">登录</button>
        <button class="tab" onclick="switchTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="loginForm" class="form active">
        <h2>欢迎回来</h2>
        <input type="text" id="loginUsername" placeholder="手机号/邮箱">
        <input type="password" id="loginPassword" placeholder="密码">
        <div id="loginMsg" class="msg"></div>
        <button onclick="login()">登录</button>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" class="form">
        <h2>欢迎注册</h2>
        <input type="email" id="regEmail" placeholder="手机号/邮箱">
        <input type="password" id="regPassword" placeholder="密码">
        <div id="regMsg" class="msg"></div>
        <button onclick="register()">注册</button>
    </div>
</div>

<script>
    if (!localStorage.getItem('users')) {
        localStorage.setItem('users', JSON.stringify([]));
    }

    function switchTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const tabs = document.querySelectorAll('.tab');
        
        if (tab === 'login') {
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
        }
    }

    function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const users = JSON.parse(localStorage.getItem('users'));
        
        const user = users.find(u => (u.username === username || u.email === username) && u.password === password);
        
        if (user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
            alert('登录成功！');
            // window.location.href = 'index.html';
        } else {
            document.getElementById('loginMsg').innerText = '用户名或密码错误';
        }
    }

    function register() {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const users = JSON.parse(localStorage.getItem('users'));
        
        if (!username || !email || !password) {
            document.getElementById('regMsg').innerText = '请填写完整信息';
            return;
        }
        
        if (users.find(u => u.username === username)) {
            document.getElementById('regMsg').innerText = '用户名已存在';
            return;
        }
        
        if (users.find(u => u.email === email)) {
            document.getElementById('regMsg').innerText = '邮箱已被注册';
            return;
        }
        
        const newUser = { username, email, password };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        alert('注册成功，请登录');
        switchTab('login');
    }
</script>
</body>
</html>
